name: Deploy static content to Pages

on:
  push:
    branches: ["main"] # Si attiva ogni volta che fai push su main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Verify Conventional Commits
        uses: wagoid/commitlint-github-action@v5 # Uno dei tanti tool disponibili 

      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          # Se i tuoi file sono in una cartella (es. 'dist' o 'public'), cambiala qui:
          path: '.' 
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
