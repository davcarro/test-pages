<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Sale 2026 - QuickLaunch S.r.l.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <h1>☀️ SCONTI ESPLOSIVI: SUMMER SALE 2026! ☀️</h1>
        <p>Acquista il nostro Kit Startup e lancia il tuo business in una settimana.</p>
        
        <div class="product-card">
            <h2>Prezzo di listino: <span id="original-price">500</span>€</h2>
            
            <div class="promo-section">
                <label for="coupon">Hai un codice sconto?</label>
                <input type="text" id="coupon" placeholder="Inserisci codice...">
                <button id="buy-btn">ACQUISTA ORA</button>
            </div>

            <p id="message"></p>
            <h2 id="final-price-display" class="hidden">Prezzo Finale: <span id="final-price"></span>€</h2>
        </div>
    </main>

    <footer>
        <p>QuickLaunch S.r.l. | Via dell'Innovazione 1, Milano | P.IVA 12345678901</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
